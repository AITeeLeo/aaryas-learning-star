<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
// Generate PNG icons from canvas
function drawIcon(size) {
  const c = document.getElementById('c');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#7C3AED');
  grad.addColorStop(1, '#EC4899');
  ctx.fillStyle = grad;

  // Rounded rect background
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Star
  const cx = size / 2, cy = size * 0.42;
  const outerR = size * 0.25, innerR = size * 0.1;
  ctx.fillStyle = '#FBBF24';
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = size * 0.04;
  drawStar(ctx, cx, cy, 5, outerR, innerR);
  ctx.shadowBlur = 0;

  // Letter "A"
  ctx.fillStyle = 'white';
  ctx.font = `bold ${size * 0.22}px system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('A', cx, cy);

  // "LEARN" text
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.font = `bold ${size * 0.1}px system-ui, sans-serif`;
  ctx.fillText('LEARN', cx, size * 0.75);

  return c.toDataURL('image/png');
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  let rot = Math.PI / 2 * 3;
  const step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR);
    rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerR);
  ctx.closePath();
  ctx.fill();
}

// Generate and display download links
[512, 192, 180].forEach(size => {
  const dataUrl = drawIcon(size);
  const a = document.createElement('a');
  const name = size === 180 ? 'apple-touch-icon.png' : `icon-${size}.png`;
  a.href = dataUrl;
  a.download = name;
  a.textContent = `Download ${name}`;
  a.style.display = 'block';
  a.style.margin = '10px';
  document.body.appendChild(a);
});
</script>
</body>
</html>
